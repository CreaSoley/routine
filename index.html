<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ceralune – Mes routines</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6b5cff">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="appbar">
  <div class="appbar-inner">

    <a class="logo">
      <img src="logo.png" class="logo-img">
      <span class="brand-title">Ceralune</span>
    </a>

    <div class="header-actions">
      <button id="btnToday" class="btn btn-primary">📅 Aujourd’hui</button>
    </div>

  </div>

  <div class="top-controls">

    <select id="daySelect">
      <option value="lundi">Lundi</option>
      <option value="mardi">Mardi</option>
      <option value="mercredi">Mercredi</option>
      <option value="jeudi">Jeudi</option>
      <option value="vendredi">Vendredi</option>
    </select>

    <input type="date" id="dateSelect">

    <button id="btnFatigue" class="btn">🔋 Mode fatigue</button>
    <button id="btnEdit" class="btn btn-primary">✏️ Éditer routines</button>
    <button id="btnTheme" class="btn">🎓 Thème formation</button>
    <button id="btnException" class="btn">⚠️ Exception</button>

  </div>
</header>

<main class="container">
  <div id="routineList" class="routines-grid"></div>
</main>

<script src="app.js"></script>
</body>
</html>
